# Manual release to Maven Central (OSSRH / Sonatype).
# Add repository secrets: SONATYPE_USERNAME, SONATYPE_PASSWORD, GPG_SIGNING_KEY,
# GPG_SIGNING_PASSWORD, and optionally GPG_SIGNING_KEY_ID.

name: Publish Maven Central
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Sonatype and release
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
          GPG_SIGNING_KEY_ID: ${{ secrets.GPG_SIGNING_KEY_ID }}
        run: ./scripts/publish-maven-central
